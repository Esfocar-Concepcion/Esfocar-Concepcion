<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>ESFOCAR Inventario 2026</title>
    <style>
        /* Estilos base para asegurar que se vea bien en GitHub */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a2420; color: #e8ede9; min-height: 100vh; }
        
        #loginWrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .lBox { background: #2d3a30; border-radius: 18px; padding: 40px; width: 330px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .lLogo { font-size: 2rem; font-weight: 900; color: #c8e6cd; margin-bottom: 5px; }
        .lSub { font-size: .7rem; color: #6a8570; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px; }
        
        .pinDisplay { background: #141e1a; border: 2px solid #3d5040; border-radius: 10px; padding: 15px; font-size: 1.8rem; 
                      margin-bottom: 20px; color: #6ab87a; font-family: monospace; letter-spacing: 8px; }
        
        .pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .pBtn { background: #3d5040; border: none; color: #fff; padding: 20px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        .pBtn:active { background: #6ab87a; }
        .pDel { background: #4a3030; }
        .pOk { background: #3a6040; grid-column: span 3; font-size: 1rem; }
        
        #app { display: none; }
        .error { color: #ff6b6b; font-size: 0.8rem; margin-top: 10px; min-height: 1.2em; }

        /* Estructura App */
        #aWrap { display: flex; height: 100vh; }
        #sb { width: 260px; background: #1e2d25; border-right: 1px solid #2a3a2e; padding: 20px; }
        #main { flex: 1; padding: 25px; overflow-y: auto; }
        .nItem { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; color: #8fb89a; }
        .nItem:hover, .nItem.on { background: #2d3a30; color: #fff; }
        .card { background: #1e2d25; padding: 20px; border-radius: 12px; border: 1px solid #2a3a2e; margin-bottom: 20px; }
        .val { font-size: 2.5rem; font-weight: bold; color: #6ab87a; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; font-size: 0.7rem; color: #6a8570; text-transform: uppercase; padding: 10px; }
        td { padding: 12px 10px; border-top: 1px solid #2a3a2e; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="loginWrap">
    <div class="lBox">
        <div class="lLogo">ESFOCAR</div>
        <div class="lSub">Gestión 2026</div>
        <div class="pinDisplay" id="pinD">____</div>
        <div class="pad">
            <button class="pBtn" onclick="addN(1)">1</button>
            <button class="pBtn" onclick="addN(2)">2</button>
            <button class="pBtn" onclick="addN(3)">3</button>
            <button class="pBtn" onclick="addN(4)">4</button>
            <button class="pBtn" onclick="addN(5)">5</button>
            <button class="pBtn" onclick="addN(6)">6</button>
            <button class="pBtn" onclick="addN(7)">7</button>
            <button class="pBtn" onclick="addN(8)">8</button>
            <button class="pBtn" onclick="addN(9)">9</button>
            <button class="pBtn pDel" onclick="delN()">←</button>
            <button class="pBtn" onclick="addN(0)">0</button>
            <button class="pBtn pOk" onclick="validate()">ENTRAR</button>
        </div>
        <div class="error" id="msg"></div>
    </div>
</div>

<div id="app">
    <div id="aWrap">
        <nav id="sb">
            <h2 style="margin-bottom: 20px; color:#c8e6cd">Menú</h2>
            <div id="nav">
                <div class="nItem on" onclick="render('dash')">📊 Dashboard</div>
                <div class="nItem" onclick="render('inv')">📋 Inventario</div>
            </div>
            <button onclick="location.reload()" style="margin-top: 20px; background:none; border:1px solid #4a3030; color:#ff6b6b; padding:8px; width:100%; border-radius:5px; cursor:pointer">Cerrar Sesión</button>
        </nav>
        <main id="main">
            <h1 id="viewTitle" style="margin-bottom: 20px;">Dashboard</h1>
            <div id="content"></div>
        </main>
    </div>
</div>

<script>
    // Configuración
    const CORRECT_PIN = "1234";
    let currentPin = "";

    // Datos simulados
    const inventario = [
        { id: "001", nombre: "Escritorio", estado: "Activo" },
        { id: "002", nombre: "Silla Ergonómica", estado: "Prestado" },
        { id: "003", nombre: "Notebook", estado: "Activo" }
    ];

    // Funciones del Teclado
    function addN(n) {
        if (currentPin.length < 4) {
            currentPin += n.toString();
            updateDisplay();
            document.getElementById('msg').innerText = "";
        }
    }

    function delN() {
        currentPin = "";
        updateDisplay();
    }

    function updateDisplay() {
        const d = document.getElementById('pinD');
        // Rellena con guiones bajos lo que falte
        d.innerText = currentPin.padEnd(4, "_");
    }

    function validate() {
        if (currentPin === CORRECT_PIN) {
            document.getElementById('loginWrap').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            render('dash');
        } else {
            document.getElementById('msg').innerText = "PIN INCORRECTO";
            currentPin = "";
            updateDisplay();
            // Efecto de sacudida visual
            document.getElementById('pinD').style.borderColor = "#ff6b6b";
            setTimeout(() => document.getElementById('pinD').style.borderColor = "#3d5040", 500);
        }
    }

    // Soporte para teclado físico (Muy importante para GitHub/Web)
    document.addEventListener('keydown', (e) => {
        if (document.getElementById('loginWrap').style.display !== 'none') {
            if (e.key >= '0' && e.key <= '9') addN(e.key);
            if (e.key === 'Backspace') delN();
            if (e.key === 'Enter') validate();
        }
    });

    // Lógica de Vistas
    function render(view) {
        const content = document.getElementById('content');
        const title = document.getElementById('viewTitle');
        
        // Actualizar UI del menú
        document.querySelectorAll('.nItem').forEach(i => i.classList.remove('on'));
        
        if (view === 'dash') {
            title.innerText = "Dashboard General";
            content.innerHTML = `
                <div class="card">
                    <div style="font-size: 0.8rem; color:#6a8570; text-transform:uppercase">Total de Especies</div>
                    <div class="val">${inventario.length}</div>
                </div>
            `;
        } else if (view === 'inv') {
            title.innerText = "Inventario Completo";
            let rows = inventario.map(i => `
                <tr>
                    <td>${i.id}</td>
                    <td>${i.nombre}</td>
                    <td><span style="color:${i.estado === 'Activo' ? '#6ab87a' : '#d4aa30'}">${i.estado}</span></td>
                </tr>
            `).join('');
            
            content.innerHTML = `
                <div class="card" style="padding:0">
                    <table>
                        <thead><tr><th>ID</th><th>Especie</th><th>Estado</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }
    }
</script>

</body>
</html>
