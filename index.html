<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>ESFOCAR - Gestión de Inventario 2026</title>
    
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root { --bg-deep: #1a2420; --bg-card: #2d3a30; --bg-input: #141e1a; --accent: #6ab87a; --text: #e8ede9; --border: #3d5040; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-deep); color: var(--text); height: 100vh; overflow: hidden; }
        #loginWrap { position: fixed; inset: 0; background: linear-gradient(135deg, var(--bg-deep), var(--bg-card)); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .lBox { background: var(--bg-card); border-radius: 20px; padding: 40px; width: 350px; border: 1px solid var(--border); text-align: center; }
        .pinDisplay { background: var(--bg-deep); border-radius: 12px; padding: 15px; font-size: 2.2rem; letter-spacing: 10px; margin-bottom: 25px; color: var(--accent); border: 2px solid var(--border); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .kBtn { background: var(--border); border: none; color: white; padding: 20px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; }
        .kBtn.ok { background: #3a6040; grid-column: span 3; }
        #app { display: none; height: 100vh; flex-direction: row; }
        #sidebar { width: 280px; background: #1e2d25; border-right: 1px solid #2a3a2e; display: flex; flex-direction: column; }
        .navItem { padding: 16px 25px; cursor: pointer; color: #8fb89a; border-left: 4px solid transparent; }
        .navItem:hover, .navItem.active { background: #253028; color: var(--accent); border-left-color: var(--accent); }
        #mainContent { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .contentArea { padding: 35px; overflow-y: auto; flex: 1; }
        .card { background: #1e2d25; border-radius: 15px; border: 1px solid #2a3a2e; margin-top: 20px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #161f1b; color: #8fb89a; padding: 12px; text-align: left; font-size: 0.75rem; }
        td { padding: 12px; border-top: 1px solid #2a3a2e; font-size: 0.85rem; }
        .btn { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-gn { background: #3a6040; color: white; }
        .btn-bl { background: #2a405a; color: white; }
        input { background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 8px; width: 100%; border-radius: 4px; }
    </style>
</head>
<body>

<div id="loginWrap">
    <div class="lBox">
        <h2 style="color:var(--accent)">ESFOCAR</h2>
        <div class="pinDisplay" id="pinDisplay">____</div>
        <div class="keypad" id="keypad"></div>
    </div>
</div>

<div id="app">
    <nav id="sidebar">
        <div style="padding: 30px; text-align: center;"><h3>MENU</h3></div>
        <div class="navItem" onclick="showView('dash')">📊 Inicio</div>
        <div class="navItem" onclick="showView('inv')">📦 Inventario Completo</div>
        <div class="navItem" onclick="showView('deps')">🏢 Planillas por Sala</div>
    </nav>
    <main id="mainContent">
        <div id="workspace" class="contentArea"></div>
    </main>
</div>

<script>
    // --- VINCULACIÓN CON TUS DATOS REALES ---
    // El archivo original usa 'e_erptec' para Concepción y 'e_hist' para el Histórico.
    let INV_CONCEPCION = JSON.parse(localStorage.getItem('e_erptec')) || [];
    let INV_HISTORICO = JSON.parse(localStorage.getItem('e_hist')) || [];
    let DEPENDENCIAS = JSON.parse(localStorage.getItem('esf_deps_v2')) || [
        {id: 1, nombre: "SALA DE ARMAS", encargado: ""},
        {id: 2, nombre: "BODEGA LOGÍSTICA", encargado: ""}
    ];

    let currentPin = "";
    const keypadDiv = document.getElementById('keypad');
    [1,2,3,4,5,6,7,8,9,'C',0,'OK'].forEach(k => {
        let b = document.createElement('button');
        b.className = 'kBtn' + (k==='OK'?' ok':'');
        b.innerText = k;
        b.onclick = () => {
            if(k==='C') currentPin = "";
            else if(k==='OK') { if(currentPin==="0507") { document.getElementById('loginWrap').style.display='none'; document.getElementById('app').style.display='flex'; showView('dash'); } }
            else if(currentPin.length<4) currentPin += k;
            document.getElementById('pinDisplay').innerText = currentPin.padEnd(4, '_');
        };
        keypadDiv.appendChild(b);
    });

    function showView(v) {
        const area = document.getElementById('workspace');
        if(v === 'dash') {
            area.innerHTML = `<h1>Resumen</h1>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div class="card"><h3>Bienes Concepción</h3><p style="font-size:2rem">${INV_CONCEPCION.length}</p></div>
                    <div class="card"><h3>Bienes Históricos</h3><p style="font-size:2rem">${INV_HISTORICO.length}</p></div>
                </div>`;
        }
        if(v === 'inv') {
            let h = `<h1>Inventario Unificado</h1><div class="card"><table><thead><tr><th>Origen</th><th>BCU</th><th>Nombre</th><th>Ubicación</th></tr></thead><tbody>`;
            INV_CONCEPCION.forEach(x => h += `<tr><td style="color:#6ab87a">CONC</td><td>${x.bcu||'S/N'}</td><td>${x.nom}</td><td>SALA ${x.did || ''}</td></tr>`);
            INV_HISTORICO.forEach(x => h += `<tr><td style="color:#d470d4">HIST</td><td>${x.bcu||'S/N'}</td><td>${x.nom}</td><td>${x.ub||'S/U'}</td></tr>`);
            area.innerHTML = h + `</tbody></table></div>`;
        }
        if(v === 'deps') {
            renderDeps();
        }
    }

    function renderDeps() {
        let h = `<h1>Gestión de Planillas</h1><button class="btn btn-gn" onclick="addDep()">+ Nueva Sala</button><div class="card"><table><thead><tr><th>Sala</th><th>Encargado (Firma)</th><th>Acciones</th></tr></thead><tbody>`;
        DEPENDENCIAS.forEach((d, i) => {
            h += `<tr>
                <td><input value="${d.nombre}" onchange="updD(${i},'nombre',this.value)"></td>
                <td><input value="${d.encargado}" placeholder="Ej: CABO 1RO JUAN PEREZ" onchange="updD(${i},'encargado',this.value)"></td>
                <td><button class="btn btn-bl" onclick="exportW(${i})">Generar Word</button></td>
            </tr>`;
        });
        document.getElementById('workspace').innerHTML = h + `</tbody></table></div>`;
    }

    function updD(i, k, v) { DEPENDENCIAS[i][k] = v.toUpperCase(); localStorage.setItem('esf_deps_v2', JSON.stringify(DEPENDENCIAS)); }
    function addDep() { let n = prompt("Nombre sala:"); if(n) { DEPENDENCIAS.push({id: Date.now(), nombre: n.toUpperCase(), encargado: ""}); renderDeps(); } }

    async function exportW(idx) {
        const dep = DEPENDENCIAS[idx];
        const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, AlignmentType, WidthType, BorderStyle } = docx;
        
        // Filtrar de ambos inventarios lo que pertenezca a esta sala
        const lista = [
            ...INV_CONCEPCION.filter(x => x.did == dep.id),
            ...INV_HISTORICO.filter(x => x.ub && x.ub.toUpperCase() === dep.nombre.toUpperCase())
        ];

        const doc = new Document({
            sections: [{
                children: [
                    new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: "ESCUELA DE FORMACIÓN DE CARABINEROS", bold: true }), new TextRun({ text: "\nGRUPO CONCEPCIÓN", break: 1 })] }),
                    new Paragraph({ alignment: AlignmentType.CENTER, spacing: { before: 400 }, children: [new TextRun({ text: "PLANILLA DE INVENTARIO: " + dep.nombre, bold: true, underline: {} })] }),
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            new TableRow({ children: [new TableCell({ children: [new Paragraph("CANT")] }), new TableCell({ children: [new Paragraph("DESCRIPCIÓN / BCU")] }), new TableCell({ children: [new Paragraph("ESTADO")] })] }),
                            ...lista.map(e => new TableRow({ children: [
                                new TableCell({ children: [new Paragraph("1")] }),
                                new TableCell({ children: [new Paragraph(`${e.nom} (BCU: ${e.bcu||'S/N'})`)] }),
                                new TableCell({ children: [new Paragraph("B")] })
                            ]}))
                        ]
                    }),
                    new Paragraph({ text: "", spacing: { before: 1500 } }),
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        borders: BorderStyle.NONE,
                        rows: [new TableRow({ children: [
                            new TableCell({ borders: BorderStyle.NONE, children: [new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: "____________________", bold: true }), new TextRun({ text: "\n" + (dep.encargado || "ENCARGADO"), break: 1 })] })] }),
                            new TableCell({ borders: BorderStyle.NONE, children: [new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: "____________________", bold: true }), new TextRun({ text: "\nFRANCISCO ALMUNA BRAVO\nMAYOR DE CARABINEROS", break: 1 })] })] })
                        ]})]
                    })
                ]
            }]
        });
        Packer.toBlob(doc).then(blob => saveAs(blob, `Inventario_${dep.nombre}.docx`));
    }
</script>
</body>
</html>
