:root{--bg:#1a2420;--card:#1e2d25;--pr:#6ab87a;--tx:#e8ede9;--dn:#e07070;--ac:#3d5040;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:var(--bg);color:var(--tx);}
#loginWrap{display:flex;align-items:center;justify-content:center;height:100vh;}

.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pBtn{background:var(--ac);border:none;color:white;padding:15px;border-radius:8px;cursor:pointer;font-size:1.2rem;}
.pBtn:active{background:var(--pr);}
.pOk{background:#3a6040;grid-column:span 3;margin-top:5px;}
#app{display:none;height:100vh;}
.aWrap{display:flex;height:100vh;}
nav{width:260px;background:var(--card);border-right:1px solid #2a3a2e;padding:20px;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
main{flex:1;padding:25px;overflow-y:auto;}
.nItem{padding:10px 12px;cursor:pointer;border-radius:6px;margin-bottom:4px;color:#8fb89a;font-size:0.83rem;}
.nItem:hover{background:#253028;}
.nItem.on{background:#2d3a30;color:white;border-left:4px solid var(--pr);font-weight:bold;}
.nSec{font-size:0.62rem;color:#6a8570;text-transform:uppercase;letter-spacing:1px;padding:10px 4px 5px;font-weight:bold;}
.sGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.sCd{background:var(--card);padding:18px;border-radius:10px;border:1px solid #2a3a2e;}
.val{font-size:1.9rem;font-weight:800;color:var(--pr);}
.lbl{font-size:0.65rem;color:#8fb89a;text-transform:uppercase;margin-top:5px;letter-spacing:1px;}
.tWrap{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid #2a3a2e;margin-bottom:14px;}
.tHead{padding:12px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a3a2e;flex-wrap:wrap;gap:8px;}
.tHead h3{font-size:0.9rem;color:var(--tx);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:11px 13px;background:#161f1b;font-size:0.72rem;color:#6a8570;text-transform:uppercase;}
td{padding:10px 13px;border-top:1px solid #2a3a2e;font-size:0.83rem;vertical-align:middle;}
tr:hover td{background:#1a2820;}
.stA{background:#1a3a20;color:#6ab87a;padding:3px 8px;border-radius:5px;font-size:0.68rem;font-weight:700;}
.stP{background:#3a3000;color:#d4aa30;padding:3px 8px;border-radius:5px;font-size:0.68rem;font-weight:700;}
.stB{background:#3a1a1a;color:#e07070;padding:3px 8px;border-radius:5px;font-size:0.68rem;font-weight:700;}
.btn{border:none;padding:7px 15px;border-radius:6px;cursor:pointer;font-size:0.8rem;font-weight:600;}
.gn{background:#3a6040;color:#c8e6cd;}.gn:hover{background:#4a7050;}
.bl{background:#2a3a5a;color:#a0c0e8;}.bl:hover{background:#3a4a6a;}
.rd{background:#5a2020;color:#e8a0a0;}.rd:hover{background:#6a2828;}
.yw{background:#4a3a10;color:#e8d080;}.yw:hover{background:#5a4a18;}
.sm{padding:4px 9px;font-size:0.72rem;}
.srch{background:#141e1a;border:1px solid #2a3a2e;color:var(--tx);padding:7px 11px;border-radius:6px;font-size:0.83rem;width:100%;margin-bottom:10px;}
.srch:focus{outline:none;border-color:var(--pr);}
.pgCtrl{display:flex;align-items:center;gap:8px;justify-content:flex-end;padding:10px 13px;border-top:1px solid #2a3a2e;}
.pgCtrl button{background:#253028;border:1px solid #2a3a2e;color:#8fb89a;padding:4px 11px;border-radius:5px;cursor:pointer;font-size:0.73rem;}
.pgCtrl span{font-size:0.73rem;color:#6a8570;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.mdl{background:var(--card);border-radius:14px;padding:28px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;border:1px solid #2a3a2e;}
.mdl h3{color:var(--tx);margin-bottom:18px;font-size:0.95rem;}
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:0.72rem;color:#8fb89a;margin-bottom:4px;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{width:100%;background:#141e1a;border:1px solid #2a3a2e;color:var(--tx);padding:7px 11px;border-radius:6px;font-size:0.82rem;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--pr);}
.fg textarea{min-height:60px;resize:vertical;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px;}
.fg2 .fg{margin-bottom:0;}
.mBtns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.empty{text-align:center;padding:30px;color:#6a8570;font-size:0.85rem;}
@media print{nav,.btn,.srch,.pgCtrl,.ov{display:none!important;}body{background:white;color:black;}main{padding:0;}table{border:1px solid #000;}th,td{border:1px solid #000;color:black!important;background:white!important;font-size:11pt;}}
</style>
</head>

<div id="loginWrap">
  <div class="lBox">
    <h2 style="color:#c8e6cd;letter-spacing:2px;margin-bottom:4px">ESFOCAR</h2>

<div id="app">

<!-- MODAL BAJA -->

// Estado de la app
let DB = { esp: [...SESP], fun: [...SFUN], dep: [...SDEP], pre: [], baj: [], log: [] };
let pin = "", currentUser = null, editId = null;
let invPg = 1, invQ = "", invDid = 0;
let prePg = 1, bajPg = 1, funPg = 1;

// ---- PERSISTENCIA ----
function save() {
  try {
    localStorage.setItem('esf_esp', JSON.stringify(DB.esp));
    localStorage.setItem('esf_fun', JSON.stringify(DB.fun));
    localStorage.setItem('esf_pre', JSON.stringify(DB.pre));
    localStorage.setItem('esf_baj', JSON.stringify(DB.baj));
    localStorage.setItem('esf_log', JSON.stringify(DB.log));
  } catch(e) {}
}
function load() {
  try {
    DB.esp = JSON.parse(localStorage.getItem('esf_esp')) || [...SESP];
    DB.fun = JSON.parse(localStorage.getItem('esf_fun')) || [...SFUN];
    DB.pre = JSON.parse(localStorage.getItem('esf_pre')) || [];
    DB.baj = JSON.parse(localStorage.getItem('esf_baj')) || [];
    DB.log = JSON.parse(localStorage.getItem('esf_log')) || [];
  } catch(e) {}
}
function logAct(msg) { DB.log.unshift({ts: new Date().toLocaleString('es-CL'), msg, u: currentUser ? currentUser.nom.split(' ')[0] : '-'}); }

// ---- LOGIN ----
window.onload = function() {
  const t = document.getElementById('teclado');
  for(let i=1;i<=9;i++) t.innerHTML += `<button class="pBtn" onclick="press(${i})">${i}</button>`;
  t.innerHTML += `<button class="pBtn" onclick="press('C')">C</button>`;
  t.innerHTML += `<button class="pBtn" onclick="press(0)">0</button>`;
  t.innerHTML += `<button class="pBtn pOk" onclick="login()">ENTRAR</button>`;
};
function press(n) {
  if(n==='C') pin=""; else if(pin.length<4) pin+=String(n);
  document.getElementById('pinD').innerText = pin.padEnd(4,'_');
  document.getElementById('lMsg').innerText = "";
}
function login() {
  const adminPin = "0507";
  const validPins = [adminPin];
  SFUN.forEach(f => { if(f.pin && f.pin.trim()) validPins.push(f.pin); });
  if(validPins.includes(pin)) {
    load();
    currentUser = DB.fun.find(f => f.pin === pin) || {nom:"Administrador", grado:"Admin", id:0};
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('userLabel').innerText = currentUser.nom.split(' ').slice(0,2).join(' ') + ' — ' + currentUser.grado;
    initApp();
  } else {
    document.getElementById('lMsg').innerText = "PIN INCORRECTO";
    pin=""; document.getElementById('pinD').innerText="____";
  }
}

// ---- APP ----
function initApp() {
  document.getElementById('menuDeps').innerHTML = DB.dep.map(d =>
    `<div class="nItem" id="m-dep${d.id}" onclick="nav('dep',${d.id})">${d.nombre}</div>`).join('');
  nav('dash');
}
function nav(v, id=null) {
  document.querySelectorAll('.nItem').forEach(i=>i.classList.remove('on'));
  document.getElementById('actions').innerHTML = '';
  const mi = document.getElementById('m-'+v+(id?id:''));
  if(mi) mi.classList.add('on');
  document.getElementById('vTitle').innerText = v==='dash'?'Dashboard':v==='inv'?'Inventario':v==='pre'?'Préstamos':v==='baj'?'Bajas':v==='fun'?'Funcionarios':id?DB.dep.find(d=>d.id===id)?.nombre||'':'';
  if(v==='dash') renderDash();
  else if(v==='inv') renderInv();
  else if(v==='pre') renderPre();
  else if(v==='baj') renderBaj();
  else if(v==='fun') renderFun();
  else if(v==='dep') renderDep(id);
}

// ---- DASHBOARD ----
function renderDash() {
  const b = DB.esp, pre = DB.pre.filter(p=>!p.fi).length;
  const act = b.filter(x=>x.est==='A').length;
  const prt = b.filter(x=>x.est==='P').length;
  const baj = b.filter(x=>x.est==='B').length;
  document.getElementById('content').innerHTML = `
    <div class="sGrid">
      <div class="sCd"><div class="val">${b.length}</div><div class="lbl">Total Bienes</div></div>
      <div class="sCd"><div class="val" style="color:#6ab87a">${act}</div><div class="lbl">Activos</div></div>
      <div class="sCd"><div class="val" style="color:#d4aa30">${prt}</div><div class="lbl">En Pr&#233;stamo</div></div>
      <div class="sCd"><div class="val" style="color:#e07070">${baj}</div><div class="lbl">Bajas</div></div>
      <div class="sCd"><div class="val" style="color:#70a4d4">${DB.dep.length}</div><div class="lbl">Dependencias</div></div>
      <div class="sCd"><div class="val" style="color:#a070d4">${DB.fun.length}</div><div class="lbl">Funcionarios</div></div>
      <div class="sCd"><div class="val" style="color:#d4aa30">${pre}</div><div class="lbl">Pr&#233;stamos Activos</div></div>
      <div class="sCd"><div class="val" style="color:#e07070">${DB.baj.length}</div><div class="lbl">Bajas Registradas</div></div>
    </div>
    <div class="tWrap"><div class="tHead"><h3>Bitácora reciente</h3></div>
    <table><thead><tr><th>Fecha</th><th>Usuario</th><th>Acción</th></tr></thead>
    <tbody>${DB.log.slice(0,10).map(l=>`<tr><td style="font-size:0.75rem;color:#6a8570">${l.ts}</td><td style="font-size:0.75rem;color:#8fb89a">${l.u}</td><td style="font-size:0.8rem">${l.msg}</td></tr>`).join('')||'<tr><td colspan="3" class="empty">Sin actividad</td></tr>'}
    </tbody></table></div>`;
}

// ---- INVENTARIO ----
function renderInv(q, did, pg2) {
  if(q!==undefined) invQ=q; if(did!==undefined) invDid=did; if(pg2) invPg=pg2;
  const PER=40;
  const fl = DB.esp.filter(e => (!invQ || e.nom.toLowerCase().includes(invQ.toLowerCase()) || e.cod.toLowerCase().includes(invQ.toLowerCase()) || (e.bcu||'').toLowerCase().includes(invQ.toLowerCase())) && (!invDid || e.did===invDid));
  const totalPg = Math.max(1,Math.ceil(fl.length/PER));
  if(invPg>totalPg) invPg=totalPg;
  const sl = fl.slice((invPg-1)*PER, invPg*PER);
  const depOpts = '<option value="0">Todas</option>' + DB.dep.map(d=>`<option value="${d.id}" ${invDid===d.id?'selected':''}>${d.nombre}</option>`).join('');
  document.getElementById('actions').innerHTML = `<button class="btn gn" onclick="openEsp(null)">+ Nuevo Bien</button>`;
  document.getElementById('content').innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <input class="srch" style="flex:1;min-width:200px" placeholder="Buscar..." value="${invQ}" oninput="renderInv(this.value,invDid,1)">
      <select class="srch" style="width:auto" onchange="renderInv(invQ,parseInt(this.value),1)">${depOpts}</select>
    </div>
    <div class="tWrap">
      <div class="tHead"><h3>${fl.length} bienes</h3></div>
      <table><thead><tr><th>C&#243;digo</th><th>Nombre</th><th>Dependencia</th><th>Estado</th><th>BCU SAP</th><th></th></tr></thead>
      <tbody>${sl.map(e => {
        const dep = DB.dep.find(d=>d.id===e.did);
        return `<tr>
          <td style="font-family:monospace;font-size:0.78rem;color:#a8d5b5">${e.cod}</td>
          <td>${e.nom}</td>
          <td style="font-size:0.78rem;color:#8fb89a">${dep?dep.nombre:'-'}</td>
          <td><span class="st${e.est}">${e.est==='A'?'ACTIVO':e.est==='P'?'PRESTADO':'BAJA'}</span></td>
          <td style="font-family:monospace;font-size:0.75rem;color:#70a4d4">${e.bcu||''}</td>
          <td><button class="btn bl sm" onclick="openEsp(${e.id})">✏️</button></td>
        </tr>`;
      }).join('')||'<tr><td colspan="6" class="empty">Sin resultados</td></tr>'}
      </tbody></table>
      <div class="pgCtrl">
        <button onclick="renderInv(invQ,invDid,Math.max(1,invPg-1))" ${invPg<=1?'disabled':''}>◀ Ant.</button>
        <span>Pág. ${invPg} / ${totalPg}</span>
        <button onclick="renderInv(invQ,invDid,Math.min(${totalPg},invPg+1))" ${invPg>=totalPg?'disabled':''}>Sig. ▶</button>
      </div>
    </div>`;
}

// ---- PRESTAMOS ----
function renderPre(pg2) {
  if(pg2) prePg=pg2;
  const PER=20, all=DB.pre, act=all.filter(p=>!p.fi), cer=all.filter(p=>p.fi);
  document.getElementById('actions').innerHTML = `<button class="btn gn" onclick="openPre()">+ Nuevo Pr&#233;stamo</button>`;
  document.getElementById('content').innerHTML = `
    <div class="tWrap" style="margin-bottom:14px"><div class="tHead"><h3>Préstamos Activos (${act.length})</h3></div>
    <table><thead><tr><th>Bien</th><th>Funcionario</th><th>Fecha</th><th>Obs.</th><th></th></tr></thead>
    <tbody>${act.length ? act.map(p => {
      const e = DB.esp.find(x=>x.id===p.eid), f = DB.fun.find(x=>x.id===p.fid);
      return `<tr>
        <td style="font-size:0.8rem">${e?e.nom:p.eid}</td>
        <td style="font-size:0.8rem;color:#8fb89a">${f?f.nom.split(' ').slice(0,2).join(' '):p.fid}</td>
        <td style="font-size:0.75rem;color:#6a8570">${p.fec||''}</td>
        <td style="font-size:0.75rem;color:#6a8570">${p.obs||''}</td>
        <td><button class="btn gn sm" onclick="devolver(${p.id})">Devolver</button></td>
      </tr>`;
    }).join('') : '<tr><td colspan="5" class="empty">Sin préstamos activos</td></tr>'}
    </tbody></table></div>
    <div class="tWrap"><div class="tHead"><h3>Historial (${cer.length})</h3></div>
    <table><thead><tr><th>Bien</th><th>Funcionario</th><th>Salida</th><th>Devoluci&#243;n</th></tr></thead>
    <tbody>${cer.slice(0,20).map(p => {
      const e = DB.esp.find(x=>x.id===p.eid), f = DB.fun.find(x=>x.id===p.fid);
      return `<tr>
        <td style="font-size:0.8rem">${e?e.nom:p.eid}</td>
        <td style="font-size:0.8rem;color:#8fb89a">${f?f.nom.split(' ').slice(0,2).join(' '):p.fid}</td>
        <td style="font-size:0.75rem;color:#6a8570">${p.fec||''}</td>
        <td style="font-size:0.75rem;color:#6ab87a">${p.fi||''}</td>
      </tr>`;
    }).join('')||'<tr><td colspan="4" class="empty">Sin historial</td></tr>'}
    </tbody></table></div>`;
}

// ---- BAJAS ----
function renderBaj() {
  document.getElementById('actions').innerHTML = `<button class="btn yw" onclick="openBaj()">+ Dar de Baja</button>`;
  document.getElementById('content').innerHTML = `
    <div class="tWrap"><div class="tHead"><h3>Bajas Registradas (${DB.baj.length})</h3></div>
    <table><thead><tr><th>Bien</th><th>Motivo</th><th>Fecha</th><th>Autorizado por</th><th>Obs.</th></tr></thead>
    <tbody>${DB.baj.length ? DB.baj.map(b => {
      const e = DB.esp.find(x=>x.id===b.eid);
      return `<tr>
        <td style="font-size:0.8rem">${e?e.nom:b.nom||b.eid}</td>
        <td style="font-size:0.78rem;color:#d4aa30">${b.mot||''}</td>
        <td style="font-size:0.75rem;color:#6a8570">${b.fec||''}</td>
        <td style="font-size:0.75rem;color:#8fb89a">${b.aut||''}</td>
        <td style="font-size:0.75rem;color:#6a8570">${b.obs||''}</td>
      </tr>`;
    }).join('') : '<tr><td colspan="5" class="empty">Sin bajas registradas</td></tr>'}
    </tbody></table></div>`;
}

// ---- FUNCIONARIOS ----
function renderFun(q) {
  const fl = DB.fun.filter(f => !q || f.nom.toLowerCase().includes(q.toLowerCase()) || (f.grado||'').toLowerCase().includes(q.toLowerCase()));
  document.getElementById('actions').innerHTML = `<button class="btn gn" onclick="openFun(null)">+ Nuevo Funcionario</button>`;
  document.getElementById('content').innerHTML = `
    <input class="srch" placeholder="Buscar funcionario..." oninput="renderFun(this.value)">
    <div class="tWrap"><div class="tHead"><h3>${fl.length} funcionarios</h3></div>
    <table><thead><tr><th>Nombre</th><th>Grado</th><th>RUT</th><th>Tipo</th><th>PIN</th><th></th></tr></thead>
    <tbody>${fl.map(f => `<tr>
      <td style="font-size:0.82rem">${f.nom}</td>
      <td style="font-size:0.78rem;color:#8fb89a">${f.grado||''}</td>
      <td style="font-family:monospace;font-size:0.75rem;color:#6a8570">${f.rut||''}</td>
      <td style="font-size:0.75rem">${f.tipo||''}</td>
      <td style="font-family:monospace;color:${f.pin?'#6ab87a':'#6a8570'}">${f.pin||'—'}</td>
      <td><button class="btn bl sm" onclick="openFun(${f.id})">✏️</button></td>
    </tr>`).join('')||'<tr><td colspan="6" class="empty">Sin resultados</td></tr>'}
    </tbody></table></div>`;
}

// ---- DEPENDENCIA ----
function renderDep(id) {
  const dep = DB.dep.find(d=>d.id===id); if(!dep) return;
  const items = DB.esp.filter(e=>e.did===id);
  document.getElementById('actions').innerHTML = `<button class="btn bl" onclick="window.print()">&#128424; Imprimir Planilla</button>`;
  document.getElementById('content').innerHTML = `
    <p style="margin-bottom:12px;color:#8fb89a;font-size:0.83rem">Total: <b>${items.length}</b> bienes — Activos: <b style="color:#6ab87a">${items.filter(e=>e.est==='A').length}</b> — Préstamo: <b style="color:#d4aa30">${items.filter(e=>e.est==='P').length}</b> — Baja: <b style="color:#e07070">${items.filter(e=>e.est==='B').length}</b></p>
    <div class="tWrap"><table>
    <thead><tr><th>C&#243;digo</th><th>Nombre</th><th>Estado</th><th>BCU SAP</th><th>N° Serie</th><th>Obs.</th></tr></thead>
    <tbody>${items.map(e=>`<tr>
      <td style="font-family:monospace;font-size:0.78rem;color:#a8d5b5">${e.cod}</td>
      <td style="font-size:0.82rem">${e.nom}</td>
      <td><span class="st${e.est}">${e.est==='A'?'ACTIVO':e.est==='P'?'PRESTADO':'BAJA'}</span></td>
      <td style="font-family:monospace;font-size:0.75rem;color:#70a4d4">${e.bcu||''}</td>
      <td style="font-family:monospace;font-size:0.75rem;color:#6a8570">${e.serie||''}</td>
      <td style="font-size:0.75rem;color:#6a8570">${e.obs||''}</td>
    </tr>`).join('')||'<tr><td colspan="6" class="empty">Sin bienes</td></tr>'}
    </tbody></table></div>`;
}

// ---- MODALES ----
function openMdl(id) { document.getElementById(id).classList.add('open'); }
function closeMdl(id) { document.getElementById(id).classList.remove('open'); editId=null; }

// Especie
function openEsp(id) {
  editId = id;
  document.getElementById('mEspT').innerText = id ? 'Editar Bien' : 'Nuevo Bien';
  const depOpts = '<option value="">-- Seleccionar --</option>' + DB.dep.map(d=>`<option value="${d.id}">${d.nombre}</option>`).join('');
  document.getElementById('eDep').innerHTML = depOpts;
  if(id) {
    const e = DB.esp.find(x=>x.id===id); if(!e) return;
    document.getElementById('eCod').value = e.cod||'';
    document.getElementById('eAnio').value = e.anio||'';
    document.getElementById('eNom').value = e.nom||'';
    document.getElementById('eDep').value = e.did||'';
    document.getElementById('eEst').value = e.est||'A';
    document.getElementById('eBcu').value = e.bcu||'';
    document.getElementById('eSerie').value = e.serie||'';
    document.getElementById('eObs').value = e.obs||'';
  } else {
    ['eCod','eAnio','eNom','eBcu','eSerie','eObs'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('eEst').value='A';
  }
  openMdl('mEsp');
}
function saveEsp() {
  const nom = document.getElementById('eNom').value.trim();
  if(!nom) { alert('Nombre requerido'); return; }
  const obj = {
    cod: document.getElementById('eCod').value.trim(),
    anio: document.getElementById('eAnio').value.trim(),
    nom, did: parseInt(document.getElementById('eDep').value)||0,
    est: document.getElementById('eEst').value,
    bcu: document.getElementById('eBcu').value.trim(),
    serie: document.getElementById('eSerie').value.trim(),
    obs: document.getElementById('eObs').value.trim()
  };
  if(editId) {
    const idx = DB.esp.findIndex(x=>x.id===editId);
    if(idx>=0) { DB.esp[idx]={...DB.esp[idx],...obj}; logAct(`Editó bien: ${nom}`); }
  } else {
    const newId = Math.max(...DB.esp.map(e=>e.id),0)+1;
    DB.esp.push({id:newId,...obj});
    logAct(`Nuevo bien: ${nom}`);
  }
  save(); closeMdl('mEsp'); renderInv();
}

// Préstamo
function openPre() {
  ['pBusq','pFBusq','pObs'].forEach(i=>document.getElementById(i).value='');
  ['pEid','pFid'].forEach(i=>document.getElementById(i).value='');
  ['pLista','pFLista'].forEach(i=>{document.getElementById(i).innerHTML='';document.getElementById(i).style.display='none';});
  document.getElementById('pFec').value = new Date().toISOString().split('T')[0];
  openMdl('mPre');
}
function buscarBien(q) {
  const lista = document.getElementById('pLista');
  if(!q) { lista.style.display='none'; return; }
  const res = DB.esp.filter(e=>e.est==='A'&&(e.nom.toLowerCase().includes(q.toLowerCase())||e.cod.toLowerCase().includes(q.toLowerCase()))).slice(0,8);
  lista.innerHTML = res.map(e=>`<div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #2a3a2e;font-size:0.8rem" onmousedown="selBien(${e.id},'${e.nom.replace(/'/g,"\'")} (${e.cod})')">${e.nom} <span style="color:#6a8570">${e.cod}</span></div>`).join('');
  lista.style.display = res.length ? 'block' : 'none';
}
function selBien(id, txt) { document.getElementById('pEid').value=id; document.getElementById('pBusq').value=txt; document.getElementById('pLista').style.display='none'; }
function buscarFun(q) {
  const lista = document.getElementById('pFLista');
  if(!q) { lista.style.display='none'; return; }
  const res = DB.fun.filter(f=>f.nom.toLowerCase().includes(q.toLowerCase())||(f.grado||'').toLowerCase().includes(q.toLowerCase())).slice(0,8);
  lista.innerHTML = res.map(f=>`<div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #2a3a2e;font-size:0.8rem" onmousedown="selFun(${f.id},'${f.nom.replace(/'/g,"\'")} (${f.grado})')">${f.nom} <span style="color:#6a8570">${f.grado}</span></div>`).join('');
  lista.style.display = res.length ? 'block' : 'none';
}
function selFun(id, txt) { document.getElementById('pFid').value=id; document.getElementById('pFBusq').value=txt; document.getElementById('pFLista').style.display='none'; }
function savePre() {
  const eid=parseInt(document.getElementById('pEid').value), fid=parseInt(document.getElementById('pFid').value);
  if(!eid||!fid) { alert('Selecciona bien y funcionario'); return; }
  const newId = Math.max(...DB.pre.map(p=>p.id),0)+1;
  DB.pre.push({id:newId, eid, fid, fec:document.getElementById('pFec').value, obs:document.getElementById('pObs').value, fi:null});
  const e=DB.esp.find(x=>x.id===eid); if(e) e.est='P';
  logAct(`Préstamo: ${e?e.nom:eid} → ${DB.fun.find(f=>f.id===fid)?.nom.split(' ')[0]||fid}`);
  save(); closeMdl('mPre'); renderPre();
}
function devolver(id) {
  const p = DB.pre.find(x=>x.id===id); if(!p) return;
  p.fi = new Date().toISOString().split('T')[0];
  const e=DB.esp.find(x=>x.id===p.eid); if(e) e.est='A';
  logAct(`Devolución: ${e?e.nom:p.eid}`);
  save(); renderPre();
}

// Baja
function openBaj() {
  ['bBusq','bAut','bObs'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('bEid').value='';
  document.getElementById('bLista').innerHTML=''; document.getElementById('bLista').style.display='none';
  document.getElementById('bFec').value = new Date().toISOString().split('T')[0];
  openMdl('mBaj');
}
function buscarBienBaj(q) {
  const lista = document.getElementById('bLista');
  if(!q) { lista.style.display='none'; return; }
  const res = DB.esp.filter(e=>e.est!=='B'&&(e.nom.toLowerCase().includes(q.toLowerCase())||e.cod.toLowerCase().includes(q.toLowerCase()))).slice(0,8);
  lista.innerHTML = res.map(e=>`<div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #2a3a2e;font-size:0.8rem" onmousedown="selBienBaj(${e.id},'${e.nom.replace(/'/g,"\'")} (${e.cod})')">${e.nom} <span style="color:#6a8570">${e.cod}</span></div>`).join('');
  lista.style.display = res.length ? 'block' : 'none';
}
function selBienBaj(id, txt) { document.getElementById('bEid').value=id; document.getElementById('bBusq').value=txt; document.getElementById('bLista').style.display='none'; }
function saveBaj() {
  const eid = parseInt(document.getElementById('bEid').value);
  if(!eid) { alert('Selecciona un bien'); return; }
  const e = DB.esp.find(x=>x.id===eid); if(!e) return;
  const newId = Math.max(...DB.baj.map(b=>b.id),0)+1;
  DB.baj.push({id:newId, eid, nom:e.nom, mot:document.getElementById('bMot').value, fec:document.getElementById('bFec').value, aut:document.getElementById('bAut').value, obs:document.getElementById('bObs').value});
  e.est='B';
  logAct(`Baja: ${e.nom} — ${document.getElementById('bMot').value}`);
  save(); closeMdl('mBaj'); renderBaj();
}

// Funcionario
function openFun(id) {
  editId = id;
  document.getElementById('mFunT').innerText = id ? 'Editar Funcionario' : 'Nuevo Funcionario';
  const depOpts = '<option value="">-- Sin asignar --</option>' + DB.dep.map(d=>`<option value="${d.id}">${d.nombre}</option>`).join('');
  document.getElementById('fDep').innerHTML = depOpts;
  if(id) {
    const f = DB.fun.find(x=>x.id===id); if(!f) return;
    document.getElementById('fNom').value=f.nom||'';
    document.getElementById('fGr').value=f.grado||'';
    document.getElementById('fRut').value=f.rut||'';
    document.getElementById('fTipo').value=f.tipo||'P.N.S';
    document.getElementById('fPin').value=f.pin||'';
    document.getElementById('fDep').value=f.did||'';
    document.getElementById('fMail').value=f.mail||'';
    document.getElementById('fObs').value=f.obs||'';
  } else {
    ['fNom','fGr','fRut','fPin','fMail','fObs'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('fTipo').value='P.N.S';
  }
  openMdl('mFun');
}
function saveFun() {
  const nom = document.getElementById('fNom').value.trim();
  if(!nom) { alert('Nombre requerido'); return; }
  const obj = {
    nom, grado:document.getElementById('fGr').value.trim(),
    rut:document.getElementById('fRut').value.trim(),
    tipo:document.getElementById('fTipo').value,
    pin:document.getElementById('fPin').value.trim(),
    did:parseInt(document.getElementById('fDep').value)||null,
    mail:document.getElementById('fMail').value.trim(),
    obs:document.getElementById('fObs').value.trim()
  };
  if(editId) {
    const idx=DB.fun.findIndex(x=>x.id===editId);
    if(idx>=0) { DB.fun[idx]={...DB.fun[idx],...obj}; logAct(`Editó funcionario: ${nom}`); }
  } else {
    const newId=Math.max(...DB.fun.map(f=>f.id),0)+1;
    DB.fun.push({id:newId,...obj});
    logAct(`Nuevo funcionario: ${nom}`);
  }
  save(); closeMdl('mFun'); renderFun();
}

// Cerrar modales al click fuera
document.addEventListener('click', e => {
  document.querySelectorAll('.ov').forEach(o => { if(e.target===o) closeMdl(o.id); });
});
</script>
