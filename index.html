<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>SISTEMA INVENTARIO ESFOCAR</title>
    <style>
        :root { --bg: #1a2420; --card: #1e2d25; --primary: #6ab87a; --text: #e8ede9; --danger: #e07070; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); }
        
        /* LOGIN */
        #loginWrap { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .lBox { background: #2d3a30; padding: 40px; border-radius: 15px; width: 320px; text-align: center; border: 1px solid #3d5040; }
        .pinD { background: #141e1a; padding: 15px; font-size: 2rem; margin-bottom: 20px; color: var(--primary); border-radius: 8px; letter-spacing: 5px; border: 1px solid #3d5040; }
        .pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .pBtn { background: #3d5040; border: none; color: white; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; }
        .pOk { background: #3a6040; grid-column: span 3; margin-top: 5px; }

        /* APP */
        #app { display: none; display: flex; height: 100vh; visibility: hidden; }
        nav { width: 260px; background: #1e2d25; border-right: 1px solid #2a3a2e; padding: 20px; }
        main { flex: 1; padding: 30px; overflow-y: auto; }
        
        .nItem { padding: 12px; cursor: pointer; border-radius: 6px; margin-bottom: 5px; color: #8fb89a; }
        .nItem.on { background: #2d3a30; color: white; border-left: 4px solid var(--primary); }
        
        .sGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .sCd { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #2a3a2e; }
        .val { font-size: 2rem; font-weight: bold; color: var(--primary); }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); }
        th { text-align: left; padding: 12px; background: #161f1b; font-size: 0.8rem; }
        td { padding: 12px; border-top: 1px solid #2a3a2e; font-size: 0.9rem; }
        
        .st-A { color: var(--primary); font-weight: bold; }
        .st-B { color: var(--danger); font-weight: bold; }
        .st-P { color: #d4aa30; font-weight: bold; }

        .btnP { background: #2b5797; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        @media print {
            nav, .btnP { display: none !important; }
            body { background: white; color: black; }
            main { padding: 0; }
            table { border: 1px solid black; }
            th, td { border: 1px solid black; color: black; }
        }
    </style>
</head>
<body>

<div id="loginWrap">
    <div class="lBox">
        <h2>ESFOCAR</h2>
        <div class="pinD" id="pinD">____</div>
        <div class="pad" id="teclado">
            </div>
        <div id="lMsg" style="color:red; margin-top:10px; font-size:12px"></div>
    </div>
</div>

<div id="app">
    <nav>
        <h3 style="margin-bottom:20px">INVENTARIO</h3>
        <div class="nItem on" id="m-dash" onclick="render('dash')">📊 Dashboard</div>
        <hr style="opacity:0.1; margin:15px 0">
        <div id="menuDeps"></div>
    </nav>
    <main>
        <div style="display:flex; justify-content:space-between; margin-bottom:20px">
            <h1 id="vTitle">Dashboard</h1>
            <div id="actions"></div>
        </div>
        <div id="content"></div>
    </main>
</div>

<script>
    // DATOS UNIFICADOS
    const DATA = {
        deps: [
            {id: 1, nombre: "SALA TRABAJO GRUPAL", encargado: "SGTO 1RO PEREZ"},
            {id: 2, nombre: "ENFERMERÍA", encargado: "CABO 2DO SOTO"},
            {id: 3, nombre: "SALA COMPUTACIÓN", encargado: "SGTO 2DO JARA"}
        ],
        bienes: [
            {id: 101, cod: "ESF-MUE-001", nom: "Mesa Reunión", did: 1, est: "A", hist: "Ingreso 2026"},
            {id: 102, cod: "ESF-MUE-028", nom: "Silla Kyos", did: 1, est: "A", hist: "Ingreso 2026"},
            {id: 103, cod: "ESF-TEC-050", nom: "Notebook i7", did: 3, est: "P", hist: "Prestado a Docencia"},
            {id: 104, cod: "ESF-TEC-010", nom: "Impresora Pro", did: 3, est: "B", hist: "Baja por falla"}
        ]
    };

    let pin = "";
    const pinCorrecto = "1234";

    // CARGA INICIAL
    window.onload = () => {
        const teclado = document.getElementById('teclado');
        for(let i=1; i<=9; i++) teclado.innerHTML += `<button class="pBtn" onclick="press(${i})">${i}</button>`;
        teclado.innerHTML += `<button class="pBtn" onclick="press('C')">C</button>`;
        teclado.innerHTML += `<button class="pBtn" onclick="press(0)">0</button>`;
        teclado.innerHTML += `<button class="pBtn pOk" onclick="login()">ENTRAR</button>`;
    };

    function press(n) {
        if(n === 'C') pin = "";
        else if(pin.length < 4) pin += n;
        document.getElementById('pinD').innerText = pin.padEnd(4, "_");
    }

    function login() {
        if(pin === pinCorrecto) {
            document.getElementById('loginWrap').style.display = 'none';
            const app = document.getElementById('app');
            app.style.display = 'flex';
            app.style.visibility = 'visible';
            initApp();
        } else {
            document.getElementById('lMsg').innerText = "PIN INCORRECTO";
            pin = "";
            press('C');
        }
    }

    function initApp() {
        const menu = document.getElementById('menuDeps');
        menu.innerHTML = DATA.deps.map(d => `<div class="nItem" id="mdep${d.id}" onclick="render('dep', ${d.id})">📍 ${d.nombre}</div>`).join('');
        render('dash');
    }

    function render(mode, id = null) {
        const cnt = document.getElementById('content');
        const acts = document.getElementById('actions');
        const tit = document.getElementById('vTitle');
        
        document.querySelectorAll('.nItem').forEach(i => i.classList.remove('on'));
        acts.innerHTML = "";

        if(mode === 'dash') {
            document.getElementById('m-dash').classList.add('on');
            tit.innerText = "Resumen Histórico";
            const b = DATA.bienes;
            cnt.innerHTML = `
                <div class="sGrid">
                    <div class="sCd"><div class="val">${b.length}</div><div style="font-size:12px">TOTAL</div></div>
                    <div class="sCd"><div class="val" style="color:#6ab87a">${b.filter(x=>x.est==='A').length}</div><div style="font-size:12px">ACTIVOS</div></div>
                    <div class="sCd"><div class="val" style="color:#e07070">${b.filter(x=>x.est==='B').length}</div><div style="font-size:12px">BAJAS</div></div>
                </div>
                ${table(b, true)}
            `;
        } else {
            const dep = DATA.deps.find(x => x.id === id);
            document.getElementById('mdep'+id).classList.add('on');
            tit.innerText = dep.nombre;
            acts.innerHTML = `<button class="btnP" onclick="window.print()">🖨️ Imprimir Planilla</button>`;
            const items = DATA.bienes.filter(x => x.did === id);
            cnt.innerHTML = `
                <p style="margin-bottom:10px; color:#8fb89a">Encargado: ${dep.encargado}</p>
                ${table(items, false)}
            `;
        }
    }

    function table(bienes, hist) {
        return `<table>
            <thead><tr><th>COD</th><th>NOMBRE</th><th>ESTADO</th>${hist?'<th>HISTORIAL</th>':''}</tr></thead>
            <tbody>
                ${bienes.map(b => `
                    <tr>
                        <td><b>${b.cod}</b></td>
                        <td>${b.nom}</td>
                        <td class="st-${b.est}">${b.est==='A'?'ACTIVO':b.est==='B'?'BAJA':'PRESTADO'}</td>
                        ${hist?`<td style="font-size:11px; color:#6a8570">${b.hist}</td>`:''}
                    </tr>
                `).join('')}
            </tbody>
        </table>`;
    }
</script>
</body>
</html>
