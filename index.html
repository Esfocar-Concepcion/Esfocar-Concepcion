<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>SISTEMA INVENTARIO ESFOCAR</title>
    <style>
        :root { --bg: #1a2420; --card: #1e2d25; --primary: #6ab87a; --text: #e8ede9; --danger: #e07070; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); }

        /* LOGIN */
        #loginWrap { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .lBox { background: #2d3a30; padding: 40px; border-radius: 15px; width: 320px; text-align: center; border: 1px solid #3d5040; }
        .pinD { background: #141e1a; padding: 15px; font-size: 2rem; margin-bottom: 20px; color: var(--primary); border-radius: 8px; letter-spacing: 5px; border: 1px solid #3d5040; }
        .pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .pBtn { background: #3d5040; border: none; color: white; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; }
        .pOk { background: #3a6040; grid-column: span 3; margin-top: 5px; }

        /* APP */
        #app { display: none; height: 100vh; }
        .appInner { display: flex; height: 100vh; }
        nav { width: 260px; background: #1e2d25; border-right: 1px solid #2a3a2e; padding: 20px; overflow-y: auto; flex-shrink: 0; }
        main { flex: 1; padding: 30px; overflow-y: auto; }

        .nItem { padding: 12px; cursor: pointer; border-radius: 6px; margin-bottom: 5px; color: #8fb89a; font-size: 0.85rem; }
        .nItem:hover { background: #253028; }
        .nItem.on { background: #2d3a30; color: white; border-left: 4px solid var(--primary); font-weight: bold; }

        .sGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .sCd { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #2a3a2e; }
        .val { font-size: 2rem; font-weight: bold; color: var(--primary); }

        .tWrap { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid #2a3a2e; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #161f1b; font-size: 0.75rem; color: #6a8570; text-transform: uppercase; }
        td { padding: 11px 12px; border-top: 1px solid #2a3a2e; font-size: 0.85rem; vertical-align: middle; }
        tr:hover td { background: #253028; }

        .st-A { color: var(--primary); font-weight: bold; }
        .st-B { color: var(--danger); font-weight: bold; }
        .st-P { color: #d4aa30; font-weight: bold; }

        .btnP { background: #2b5797; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }
        .btnP:hover { background: #3569b3; }

        .srch { background: #141e1a; border: 1px solid #2a3a2e; color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; width: 100%; margin-bottom: 12px; }
        .srch:focus { outline: none; border-color: var(--primary); }

        .pgCtrl { display: flex; align-items: center; gap: 10px; justify-content: flex-end; padding: 10px 12px; border-top: 1px solid #2a3a2e; }
        .pgCtrl button { background: #253028; border: 1px solid #2a3a2e; color: #8fb89a; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.75rem; }
        .pgCtrl span { font-size: 0.75rem; color: #6a8570; }

        @media print {
            nav, .btnP, .srch, .pgCtrl { display: none !important; }
            body { background: white; color: black; }
            main { padding: 0; }
            table { border: 1px solid black; }
            th, td { border: 1px solid black; color: black !important; background: white !important; }
        }
    </style>
</head>

</div>

let pin = "";
let currentUser = null;
const PER = 40;
let pg = 1;
let searchQ = "";

// ---- LOGIN ----
window.onload = function() {
    const teclado = document.getElementById('teclado');
    for(let i = 1; i <= 9; i++) teclado.innerHTML += `<button class="pBtn" onclick="press(${i})">${i}</button>`;
    teclado.innerHTML += `<button class="pBtn" onclick="press('C')">C</button>`;
    teclado.innerHTML += `<button class="pBtn" onclick="press(0)">0</button>`;
    teclado.innerHTML += `<button class="pBtn pOk" onclick="login()">ENTRAR</button>`;
};

function press(n) {
    if(n === 'C') { pin = ""; }
    else if(pin.length < 4) { pin += String(n); }
    document.getElementById('pinD').innerText = pin.padEnd(4, "_");
    document.getElementById('lMsg').innerText = "";
}

function login() {
    const validPins = ["0507"];
    SFUN.forEach(function(f){ if(f.pin && f.pin.trim() !== '') validPins.push(f.pin); });

    if(validPins.indexOf(pin) >= 0) {
        currentUser = SFUN.find(f => f.pin === pin) || {nom: "Administrador", grado: "Admin"};
        document.getElementById('loginWrap').style.display = 'none';
        const app = document.getElementById('app');
        app.style.display = 'block';
        document.getElementById('userLabel').innerText = currentUser.nom.split(' ')[0] + ' — ' + currentUser.grado;
        initApp();
    } else {
        document.getElementById('lMsg').innerText = "PIN INCORRECTO";
        pin = "";
        document.getElementById('pinD').innerText = "____";
    }
}

// ---- APP ----
function initApp() {
    const menu = document.getElementById('menuDeps');
    menu.innerHTML = SDEP.map(d => `<div class="nItem" id="mdep${d.id}" onclick="render('dep', ${d.id})">${d.nombre}</div>`).join('');
    render('dash');
}

function render(mode, id = null) {
    const cnt = document.getElementById('content');
    const acts = document.getElementById('actions');
    document.querySelectorAll('.nItem').forEach(i => i.classList.remove('on'));
    acts.innerHTML = "";
    pg = 1;

    if(mode === 'dash') {
        document.getElementById('m-dash').classList.add('on');
        document.getElementById('vTitle').innerText = "Dashboard";
        const b = SESP;
        const activos = b.filter(x => x.est === 'A').length;
        const prestados = b.filter(x => x.est === 'P').length;
        const bajas = b.filter(x => x.est === 'B').length;
        cnt.innerHTML = `
            <div class="sGrid">
                <div class="sCd"><div class="val">${b.length}</div><div style="font-size:12px;color:#8fb89a;margin-top:5px">TOTAL BIENES</div></div>
                <div class="sCd"><div class="val" style="color:#6ab87a">${activos}</div><div style="font-size:12px;color:#8fb89a;margin-top:5px">ACTIVOS</div></div>
                <div class="sCd"><div class="val" style="color:#d4aa30">${prestados}</div><div style="font-size:12px;color:#8fb89a;margin-top:5px">EN PR&Eacute;STAMO</div></div>
                <div class="sCd"><div class="val" style="color:#e07070">${bajas}</div><div style="font-size:12px;color:#8fb89a;margin-top:5px">BAJAS</div></div>
                <div class="sCd"><div class="val" style="color:#70a4d4">${SDEP.length}</div><div style="font-size:12px;color:#8fb89a;margin-top:5px">DEPENDENCIAS</div></div>
                <div class="sCd"><div class="val" style="color:#a070d4">${SFUN.length}</div><div style="font-size:12px;color:#8fb89a;margin-top:5px">FUNCIONARIOS</div></div>
            </div>
            <h3 style="margin-bottom:12px; font-size:0.9rem; color:#8fb89a; text-transform:uppercase; letter-spacing:1px">Top Dependencias por Bienes</h3>
            <div class="tWrap"><table>
                <thead><tr><th>Dependencia</th><th>Total</th><th>Activos</th><th>En Pr&eacute;stamo</th><th>Bajas</th></tr></thead>
                <tbody>${SDEP.map(d => {
                    const items = SESP.filter(e => e.did === d.id);
                    if(!items.length) return '';
                    return `<tr>
                        <td>${d.nombre}</td>
                        <td><b>${items.length}</b></td>
                        <td class="st-A">${items.filter(e=>e.est==='A').length}</td>
                        <td class="st-P">${items.filter(e=>e.est==='P').length}</td>
                        <td class="st-B">${items.filter(e=>e.est==='B').length}</td>
                    </tr>`;
                }).join('')}</tbody>
            </table></div>`;

    } else if(mode === 'search') {
        document.getElementById('m-search').classList.add('on');
        document.getElementById('vTitle').innerText = "Buscar Bienes";
        renderSearch(searchQ, 1);

    } else {
        const dep = SDEP.find(x => x.id === id);
        if(!dep) return;
        document.getElementById('mdep'+id).classList.add('on');
        document.getElementById('vTitle').innerText = dep.nombre;
        acts.innerHTML = `<button class="btnP" onclick="window.print()">&#128424; Imprimir Planilla</button>`;
        const items = SESP.filter(x => x.did === id);
        cnt.innerHTML = `
            <p style="margin-bottom:12px; color:#8fb89a; font-size:0.85rem">Total: <b>${items.length}</b> bienes &mdash; Activos: <b style="color:#6ab87a">${items.filter(e=>e.est==='A').length}</b></p>
            <div class="tWrap">${renderTable(items, false)}</div>`;
    }
}

function renderSearch(q, p) {
    searchQ = q;
    pg = p;
    const cnt = document.getElementById('content');
    const fl = SESP.filter(e => !q || e.nom.toLowerCase().includes(q.toLowerCase()) || e.cod.toLowerCase().includes(q.toLowerCase()) || (e.bcu && e.bcu.toLowerCase().includes(q.toLowerCase())));
    const totalPg = Math.max(1, Math.ceil(fl.length / PER));
    const sl = fl.slice((pg-1)*PER, pg*PER);
    cnt.innerHTML = `
        <input class="srch" id="srchBox" placeholder="Buscar por nombre, código o BCU SAP..." value="${q}" oninput="renderSearch(this.value,1)">
        <p style="font-size:0.8rem; color:#6a8570; margin-bottom:10px">${fl.length} resultado(s)</p>
        <div class="tWrap">
            ${renderTable(sl, true)}
            <div class="pgCtrl">
                <button onclick="renderSearch(searchQ, Math.max(1,pg-1))" ${pg<=1?'disabled':''}>&#9664; Ant.</button>
                <span>P&aacute;g. ${pg} / ${totalPg}</span>
                <button onclick="renderSearch(searchQ, Math.min(${totalPg},pg+1))" ${pg>=totalPg?'disabled':''}>Sig. &#9654;</button>
            </div>
        </div>`;
}

function renderTable(data, showDep) {
    if(!data.length) return `<div style="padding:30px; text-align:center; color:#6a8570">Sin registros.</div>`;
    return `<table>
        <thead><tr><th>C&oacute;digo</th><th>Nombre</th>${showDep?'<th>Dependencia</th>':''}<th>Estado</th><th>Obs.</th></tr></thead>
        <tbody>${data.map(e => {
            const dep = SDEP.find(d => d.id === e.did);
            return `<tr>
                <td style="font-family:monospace; font-size:0.8rem">${e.cod}</td>
                <td>${e.nom}</td>
                ${showDep ? `<td style="font-size:0.78rem; color:#8fb89a">${dep ? dep.nombre : '-'}</td>` : ''}
                <td class="st-${e.est}">${e.est==='A'?'ACTIVO':e.est==='P'?'PRESTADO':'BAJA'}</td>
                <td style="font-size:0.75rem; color:#6a8570">${e.obs||''}</td>
            </tr>`;
        }).join('')}</tbody>
    </table>`;
}
</script>
