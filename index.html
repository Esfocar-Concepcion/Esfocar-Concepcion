<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>ESFOCAR - Gestión de Inventario 2026</title>
    
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --bg-deep: #1a2420;
            --bg-card: #2d3a30;
            --bg-input: #141e1a;
            --accent: #6ab87a;
            --text: #e8ede9;
            --border: #3d5040;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-deep); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* LOGIN */
        #loginWrap { position: fixed; inset: 0; background: linear-gradient(135deg, var(--bg-deep), var(--bg-card)); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .lBox { background: var(--bg-card); border-radius: 20px; padding: 40px; width: 350px; box-shadow: 0 15px 50px rgba(0,0,0,0.7); text-align: center; border: 1px solid var(--border); }
        .pinDisplay { background: var(--bg-deep); border-radius: 12px; padding: 15px; font-size: 2.2rem; letter-spacing: 10px; margin-bottom: 25px; color: var(--accent); border: 2px solid var(--border); font-weight: bold; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .kBtn { background: var(--border); border: none; color: white; padding: 20px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; font-weight: bold; transition: 0.2s; }
        .kBtn:hover { background: #4a5d4e; transform: scale(1.05); }
        .kBtn.ok { background: #3a6040; grid-column: span 3; margin-top: 10px; font-size: 1rem; }

        /* APP LAYOUT */
        #app { display: none; height: 100vh; flex-direction: row; }
        #sidebar { width: 280px; background: #1e2d25; border-right: 1px solid #2a3a2e; display: flex; flex-direction: column; }
        .sbHeader { padding: 30px 20px; border-bottom: 1px solid #2a3a2e; text-align: center; }
        .navItem { padding: 16px 25px; cursor: pointer; color: #8fb89a; border-left: 4px solid transparent; transition: 0.3s; font-size: 0.95rem; }
        .navItem:hover, .navItem.active { background: #253028; color: var(--accent); border-left-color: var(--accent); }
        
        #mainContent { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topBar { padding: 18px 35px; background: #1e2d25; border-bottom: 1px solid #2a3a2e; display: flex; justify-content: space-between; align-items: center; }
        .contentArea { padding: 35px; overflow-y: auto; flex: 1; }

        /* TABLAS Y FORMULARIOS */
        .card { background: #1e2d25; border-radius: 15px; border: 1px solid #2a3a2e; overflow: hidden; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #161f1b; color: #8fb89a; padding: 14px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 14px; border-top: 1px solid #2a3a2e; font-size: 0.9rem; vertical-align: middle; }
        
        .btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
        .btn-gn { background: #3a6040; color: #c8e6cd; }
        .btn-bl { background: #2a405a; color: #a0c8e8; }
        .btn-rd { background: #5a2020; color: #e8a0a0; }
        .btn:hover { opacity: 0.85; transform: translateY(-1px); }

        input.text-entry { background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 8px 12px; border-radius: 6px; width: 100%; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-conc { background: #1a3a2a; color: #6ab87a; }
        .badge-hist { background: #3a1a3a; color: #d470d4; }
    </style>
</head>
<body>

<div id="loginWrap">
    <div class="lBox">
        <h1 style="color:var(--accent); letter-spacing: 4px; margin-bottom: 10px;">ESFOCAR</h1>
        <p style="font-size: 0.7rem; color: #6a8570; margin-bottom: 25px; text-transform: uppercase;">Unidad de Inventario Logístico</p>
        <div class="pinDisplay" id="pinDisplay">____</div>
        <div class="keypad" id="keypad"></div>
    </div>
</div>

<div id="app">
    <nav id="sidebar">
        <div class="sbHeader">
            <h2 style="color: var(--accent);">MENU</h2>
        </div>
        <div class="navItem" onclick="showView('dash')">📊 Inicio</div>
        <div class="navItem" onclick="showView('inv')">📦 Inventario Unificado</div>
        <div class="navItem" onclick="showView('deps')">🏢 Gestión de Dependencias</div>
        <div style="margin-top: auto; padding: 30px;">
            <button class="btn btn-rd" style="width: 100%;" onclick="location.reload()">Salir</button>
        </div>
    </nav>

    <main id="mainContent">
        <div class="topBar">
            <h2 id="titleView">Dashboard</h2>
            <span id="userName" style="color: #6a8570; font-size: 0.9rem;">Admin: Francisco Almuna Bravo</span>
        </div>
        <div id="workspace" class="contentArea"></div>
    </main>
</div>

<script>
    // --- DATOS MAESTROS (Persistencia en LocalStorage) ---
    let DEPENDENCIAS = JSON.parse(localStorage.getItem('esf_deps')) || [
        {id: 1, nombre: "SALA DE ARMAS", encargado: ""},
        {id: 2, nombre: "BODEGA LOGÍSTICA", encargado: ""},
        {id: 3, nombre: "COMEDOR ALUMNOS", encargado: ""}
    ];
    
    let INV_CONCEPCION = JSON.parse(localStorage.getItem('e_erptec')) || [];
    let INV_HISTORICO = JSON.parse(localStorage.getItem('e_hloc')) || [];

    // --- SISTEMA DE LOGIN ---
    let currentPin = "";
    const keys = [1,2,3,4,5,6,7,8,9, 'BORRAR', 0, 'ENTRAR'];
    const keypadDiv = document.getElementById('keypad');

    keys.forEach(k => {
        let btn = document.createElement('button');
        btn.className = 'kBtn' + (k === 'ENTRAR' ? ' ok' : '');
        btn.innerText = k;
        btn.onclick = () => {
            if(k === 'BORRAR') currentPin = "";
            else if(k === 'ENTRAR') {
                if(currentPin === "0507") loginSuccess();
                else { alert("PIN INCORRECTO"); currentPin = ""; }
            } else if(currentPin.length < 4) {
                currentPin += k;
            }
            document.getElementById('pinDisplay').innerText = currentPin.padEnd(4, '_');
        };
        keypadDiv.appendChild(btn);
    });

    function loginSuccess() {
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        showView('dash');
    }

    // --- NAVEGACIÓN Y VISTAS ---
    function showView(view) {
        const area = document.getElementById('workspace');
        const title = document.getElementById('titleView');
        
        if(view === 'dash') {
            title.innerText = "Dashboard General";
            area.innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px;">
                    <div class="card" style="padding: 30px; text-align: center;">
                        <h3 style="color: #6ab87a">Inventario Concepción</h3>
                        <p style="font-size: 3rem; margin-top: 10px;">${INV_CONCEPCION.length}</p>
                    </div>
                    <div class="card" style="padding: 30px; text-align: center;">
                        <h3 style="color: #d470d4">Inventario Histórico</h3>
                        <p style="font-size: 3rem; margin-top: 10px;">${INV_HISTORICO.length}</p>
                    </div>
                </div>
            `;
        }

        if(view === 'inv') {
            title.innerText = "Inventario Unificado";
            let tableHtml = `
                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>Origen</th>
                                <th>BCU/Código</th>
                                <th>Descripción del Bien</th>
                                <th>Ubicación Actual</th>
                            </tr>
                        </thead>
                        <tbody>`;
            
            INV_CONCEPCION.forEach(e => {
                let d = DEPENDENCIAS.find(x => x.id == e.did);
                tableHtml += `<tr>
                    <td><span class="badge badge-conc">Concepción</span></td>
                    <td>${e.bcu || e.cod || 'S/N'}</td>
                    <td>${e.nom}</td>
                    <td>${d ? d.nombre : 'POR ASIGNAR'}</td>
                </tr>`;
            });

            INV_HISTORICO.forEach(e => {
                tableHtml += `<tr>
                    <td><span class="badge badge-hist">Histórico</span></td>
                    <td>${e.bcu || 'S/N'}</td>
                    <td>${e.nom}</td>
                    <td>${e.ub || 'SIN UBICACIÓN'}</td>
                </tr>`;
            });

            tableHtml += `</tbody></table></div>`;
            area.innerHTML = tableHtml;
        }

        if(view === 'deps') {
            renderGestionDeps();
        }
    }

    // --- GESTIÓN DE DEPENDENCIAS ---
    function renderGestionDeps() {
        document.getElementById('titleView').innerText = "Gestión y Planillas";
        let h = `
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <p style="color: #8fb89a">Edite los nombres, asigne encargados y descargue planillas oficiales.</p>
                <button class="btn btn-gn" onclick="crearDependencia()">+ Nueva Dependencia</button>
            </div>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre de Dependencia</th>
                            <th>Encargado (Firma Izquierda)</th>
                            <th style="text-align:right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>`;
        
        DEPENDENCIAS.forEach((d, i) => {
            h += `<tr>
                <td><input type="text" class="text-entry" value="${d.nombre}" onchange="updateDep(${i}, 'nombre', this.value)"></td>
                <td><input type="text" class="text-entry" value="${d.encargado || ''}" placeholder="Grado y Nombre..." onchange="updateDep(${i}, 'encargado', this.value)"></td>
                <td style="text-align:right">
                    <button class="btn btn-bl" onclick="exportWord(${i})">📥 Word</button>
                    <button class="btn btn-rd" onclick="eliminarDep(${i})">Eliminar</button>
                </td>
            </tr>`;
        });
        h += `</tbody></table></div>`;
        document.getElementById('workspace').innerHTML = h;
    }

    function updateDep(idx, campo, valor) {
        DEPENDENCIAS[idx][campo] = valor.toUpperCase();
        localStorage.setItem('esf_deps', JSON.stringify(DEPENDENCIAS));
    }

    function crearDependencia() {
        let n = prompt("Nombre de la nueva sala/dependencia:");
        if(n) {
            DEPENDENCIAS.push({ id: Date.now(), nombre: n.toUpperCase(), encargado: "" });
            localStorage.setItem('esf_deps', JSON.stringify(DEPENDENCIAS));
            renderGestionDeps();
        }
    }

    function eliminarDep(i) {
        if(confirm("¿Está seguro de eliminar esta dependencia?")) {
            DEPENDENCIAS.splice(i, 1);
            localStorage.setItem('esf_deps', JSON.stringify(DEPENDENCIAS));
            renderGestionDeps();
        }
    }

    // --- EXPORTACIÓN A WORD (FORMATO SOLICITADO) ---
    async function exportWord(idx) {
        const dep = DEPENDENCIAS[idx];
        
        // Unificar bienes para el Word de esta dependencia
        const unificados = [
            ...INV_CONCEPCION.filter(e => e.did == dep.id),
            ...INV_HISTORICO.filter(e => e.ub === dep.nombre)
        ];

        const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, AlignmentType, WidthType, BorderStyle } = docx;

        const doc = new Document({
            sections: [{
                children: [
                    new Paragraph({
                        alignment: AlignmentType.CENTER,
                        children: [
                            new TextRun({ text: "ESCUELA DE FORMACIÓN DE CARABINEROS", bold: true, size: 24 }),
                            new TextRun({ text: "\nGRUPO CONCEPCIÓN", break: 1, size: 20 }),
                        ],
                    }),
                    new Paragraph({ text: "", spacing: { after: 400 } }),
                    new Paragraph({
                        alignment: AlignmentType.CENTER,
                        children: [
                            new TextRun({ text: "PLANILLA DE INVENTARIO DE CARGO", bold: true, size: 28, underline: {} }),
                        ],
                    }),
                    new Paragraph({
                        alignment: AlignmentType.LEFT,
                        children: [
                            new TextRun({ text: `DEPENDENCIA: ${dep.nombre}`, bold: true, size: 24 }),
                        ],
                        spacing: { before: 400, after: 400 }
                    }),

                    // TABLA DE PRODUCTOS
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            new TableRow({
                                children: [
                                    new TableCell({ children: [new Paragraph({ text: "CANT", bold: true, alignment: AlignmentType.CENTER })] }),
                                    new TableCell({ children: [new Paragraph({ text: "DESCRIPCIÓN DE LA ESPECIE / BCU", bold: true })] }),
                                    new TableCell({ children: [new Paragraph({ text: "ESTADO", bold: true, alignment: AlignmentType.CENTER })] }),
                                ],
                            }),
                            ...unificados.map(e => new TableRow({
                                children: [
                                    new TableCell({ children: [new Paragraph({ text: "1", alignment: AlignmentType.CENTER })] }),
                                    new TableCell({ children: [new Paragraph(`${e.nom} - BCU: ${e.bcu || 'S/N'}`)] }),
                                    new TableCell({ children: [new Paragraph({ text: e.est || "B", alignment: AlignmentType.CENTER })] }),
                                ],
                            }))
                        ],
                    }),

                    new Paragraph({ text: "", spacing: { before: 2000 } }),

                    // BLOQUE DE FIRMAS
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        borders: BorderStyle.NONE,
                        rows: [
                            new TableRow({
                                children: [
                                    new TableCell({
                                        borders: BorderStyle.NONE,
                                        children: [
                                            new Paragraph({
                                                alignment: AlignmentType.CENTER,
                                                children: [
                                                    new TextRun({ text: "__________________________", bold: true }),
                                                    new TextRun({ text: `\n${dep.encargado || 'ENCARGADO'}`, break: 1, bold: true }),
                                                    new TextRun({ text: "\nENCARGADO DE DEPENDENCIA", size: 18, break: 1 }),
                                                ],
                                            }),
                                        ],
                                    }),
                                    new TableCell({
                                        borders: BorderStyle.NONE,
                                        children: [
                                            new Paragraph({
                                                alignment: AlignmentType.CENTER,
                                                children: [
                                                    new TextRun({ text: "__________________________", bold: true }),
                                                    new TextRun({ text: "\nFRANCISCO ALMUNA BRAVO", break: 1, bold: true }),
                                                    new TextRun({ text: "\nMAYOR DE CARABINEROS", break: 1 }),
                                                    new TextRun({ text: "\nCOMANDANTE DE GRUPO", break: 1 }),
                                                ],
                                            }),
                                        ],
                                    }),
                                ],
                            }),
                        ],
                    }),
                ],
            }],
        });

        Packer.toBlob(doc).then(blob => {
            saveAs(blob, `Inventario_${dep.nombre}.docx`);
        });
    }
</script>
</body>
</html>
